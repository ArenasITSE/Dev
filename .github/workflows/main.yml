name: Streamlit Keep Alive Bot

on:
  schedule:
    - cron: '0 */2 * * *' # Se ejecuta automáticamente cada 6 horas
  workflow_dispatch:      # Permite ejecución manual desde la pestaña "Actions"

jobs:
  ping_job:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargando código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurando entorno Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 3. Instalando Selenium y Webdriver Manager
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: 4. Localizando y ejecutando el script
        run: |
          # Buscamos el archivo keep_alive.py en todo el repo
          SCRIPT_PATH=$(find . -name "keep_alive.py" | head -n 1)
          
          if [ -z "$SCRIPT_PATH" ]; then
            echo "Error: No se encontró el archivo keep_alive.py en ninguna carpeta."
            exit 1
          fi
          
          echo "Archivo encontrado en: $SCRIPT_PATH"
          python "$SCRIPT_PATH"
